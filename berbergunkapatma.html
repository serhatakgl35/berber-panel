<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Takvim Yönetimi</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
background:#f5f5f7;
color:#111;
}

.container{
max-width:1100px;
margin:20px auto;
padding:15px;
}

.box{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
cursor:pointer;
}

th{
background:#eee;
}

.kapali{
background:#e0e0e0;
color:#666;
}

.dolu{
background:#ffd9d9;
color:#8b0000;
font-weight:bold;
}

.musait{
background:#dff3df;
color:#146214;
}

</style>
</head>

<body>

<div class="container">
<div class="box">
<h2>Takvim Yönetimi</h2>

<div id="takvim"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
authDomain:"berber-randevu-14f7f.firebaseapp.com",
projectId:"berber-randevu-14f7f",
storageBucket:"berber-randevu-14f7f.firebasestorage.app",
messagingSenderId:"280530860977",
appId:"1:280530860977:web:52c0df04c228896f211b90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SAATLER = ["09:00","09:50","10:30","11:20","13:20","14:00","14:50","15:30"];

function tarihKey(d){
return d.toISOString().split("T")[0];
}

function hafta(){
const d = new Date();
const day = d.getDay();
const diff = d.getDate() - day + (day === 0 ? -6 : 1);
const monday = new Date(d.setDate(diff));

let arr=[];
for(let i=0;i<5;i++){
let x=new Date(monday);
x.setDate(monday.getDate()+i);
arr.push(x);
}
return arr;
}

async function ciz(){

const gunler = hafta();
let html="<table><tr><th>Saat</th>";

gunler.forEach(g=>{
const t=tarihKey(g);
html+=`<th onclick="gunKapat('${t}')">${t}</th>`;
});

html+="</tr>";

SAATLER.forEach(s=>{
html+=`<tr><td onclick="saatKapat('${s}')">${s}</td>`;

gunler.forEach(g=>{
const t=tarihKey(g);
html+=`<td class="musait">${t}<br>${s}</td>`;
});

html+="</tr>";
});

html+="</table>";

document.getElementById("takvim").innerHTML=html;

}

window.gunKapat = async function(tarih){
await setDoc(doc(db,"kapali_gunler",tarih),{kapali:true});
alert("Gün kapatıldı");
}

window.saatKapat = async function(saat){
await setDoc(doc(db,"kapali_saatler",Date.now()+""),{
tarih:tarihKey(new Date()),
saat:saat
});
alert("Saat kapatıldı");
}

ciz();

</script>

</body>
</html>
