<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Nisan İstatistik Aktarımı</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width:100%; max-width:100%; overflow-x:hidden; }
    body {
      margin:0;
      background:linear-gradient(180deg,#f7f8fb 0%,#eef1f7 100%);
      color:#111;
      font-family:Arial, sans-serif;
    }
    .topnav {
      width:100%; background:#111; color:#fff; padding:14px 16px;
      display:flex; justify-content:center; gap:12px; flex-wrap:wrap;
      position:sticky; top:0; z-index:999; box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }
    .topnav a { color:#fff; text-decoration:none; background:#222; padding:10px 16px; border-radius:10px; font-weight:600; }
    .page { max-width:900px; margin:0 auto; padding:16px; }
    .card {
      background:rgba(255,255,255,0.94); border-radius:24px; padding:22px;
      box-shadow:0 12px 30px rgba(16,24,40,0.08); border:1px solid rgba(255,255,255,0.8);
      margin-top:16px;
    }
    h1 { margin:0 0 10px; font-size:28px; letter-spacing:-0.3px; }
    .desc { color:#667085; line-height:1.5; font-size:14px; margin-bottom:18px; }
    button {
      width:100%; border:none; background:linear-gradient(135deg,#111827 0%,#1f2937 100%);
      color:#fff; padding:14px 18px; border-radius:14px; font-size:16px; font-weight:800;
      cursor:pointer; box-shadow:0 6px 16px rgba(17,24,39,0.18);
    }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .status {
      margin-top:16px; padding:14px; border-radius:14px; background:#f2f4f7;
      color:#344054; white-space:pre-wrap; line-height:1.5; font-size:14px;
    }
    .ok { background:#ecfdf3; color:#027a48; }
    .err { background:#fff1f3; color:#b42318; }
    table { width:100%; border-collapse:collapse; margin-top:16px; background:#fff; border-radius:16px; overflow:hidden; }
    th, td { padding:12px; border-bottom:1px solid #eee; text-align:left; font-size:14px; }
    th { background:#111; color:#fff; }
    @media(max-width:600px){ .page{padding:10px;} .card{padding:16px;border-radius:18px;} h1{font-size:23px;} }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="index.html">Ana Sayfa</a>
    <a href="takvim.html">Takvimli Liste</a>
    <a href="istatistik.html">İstatistik</a>
  </nav>

  <div class="page">
    <div class="card">
      <h1>Nisan İstatistik Aktarımı</h1>
      <div class="desc">
        Bu sayfa sadece <b>2026 Nisan</b> ayındaki geçmiş randevuları okur ve gün gün <b>istatistikler</b> koleksiyonuna yazar.
        Bir kere çalıştırmanız yeterlidir. Mevcut randevuları silmez, şablonu bozmaz.
      </div>
      <button id="aktarBtn" type="button">Nisan Verilerini İstatistiklere Aktar</button>
      <div id="status" class="status">Hazır. Butona basınca aktarım başlayacak.</div>
      <div id="sonuc"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
      authDomain: "berber-randevu-14f7f.firebaseapp.com",
      projectId: "berber-randevu-14f7f",
      storageBucket: "berber-randevu-14f7f.firebasestorage.app",
      messagingSenderId: "280530860977",
      appId: "1:280530860977:web:52c0df04c228896f211b90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const aktarBtn = document.getElementById("aktarBtn");
    const statusEl = document.getElementById("status");
    const sonucEl = document.getElementById("sonuc");

    function durumYaz(metin, tip = "") {
      statusEl.className = "status" + (tip ? " " + tip : "");
      statusEl.textContent = metin;
    }

    function tarihAl(data) {
      return String(data.date || data.tarih || data.randevuTarihi || data.randevu_tarihi || "").trim();
    }

    function tabloBas(gunluk) {
      const gunler = Object.keys(gunluk).sort();
      if (!gunler.length) {
        sonucEl.innerHTML = "";
        return;
      }
      const toplam = gunler.reduce((sum, tarih) => sum + gunluk[tarih], 0);
      sonucEl.innerHTML = `
        <table>
          <thead>
            <tr><th>Tarih</th><th>Aktarılan Toplam</th></tr>
          </thead>
          <tbody>
            ${gunler.map(tarih => `<tr><td>${tarih}</td><td><b>${gunluk[tarih]}</b></td></tr>`).join("")}
            <tr><td><b>Genel Toplam</b></td><td><b>${toplam}</b></td></tr>
          </tbody>
        </table>
      `;
    }

    async function nisanVerileriniAktar() {
      aktarBtn.disabled = true;
      sonucEl.innerHTML = "";
      durumYaz("Nisan kayıtları okunuyor...");

      try {
        const baslangic = "2026-04-01";
        const bitis = "2026-04-30";

        const q = query(
          collection(db, "randevu_gecmisi"),
          where("date", ">=", baslangic),
          where("date", "<=", bitis)
        );

        const snap = await getDocs(q);
        const gunluk = {};

        snap.forEach((docItem) => {
          const data = docItem.data() || {};
          const tarih = tarihAl(data);
          if (!/^2026-04-\d{2}$/.test(tarih)) return;
          gunluk[tarih] = (gunluk[tarih] || 0) + 1;
        });

        const gunler = Object.keys(gunluk).sort();
        if (!gunler.length) {
          durumYaz("Nisan 2026 için randevu_gecmisi içinde kayıt bulunamadı.", "err");
          return;
        }

        durumYaz("Günlük toplamlar bulundu. istatistikler koleksiyonuna yazılıyor...");

        for (const tarih of gunler) {
          const ay = tarih.slice(0, 7);
          const yil = tarih.slice(0, 4);

          await setDoc(doc(db, "istatistikler", tarih), {
            tarih,
            ay,
            yil,
            toplam: gunluk[tarih],
            kaynak: "nisan_aktarim",
            updatedAt: serverTimestamp()
          }, { merge: true });
        }

        tabloBas(gunluk);
        const toplam = gunler.reduce((sum, tarih) => sum + gunluk[tarih], 0);
        durumYaz(`Aktarım tamamlandı ✅\n${gunler.length} gün yazıldı.\nToplam ${toplam} randevu istatistikler koleksiyonuna aktarıldı.`, "ok");
      } catch (error) {
        console.error(error);
        durumYaz("Aktarım hatası: " + error.message, "err");
      } finally {
        aktarBtn.disabled = false;
      }
    }

    aktarBtn.addEventListener("click", nisanVerileriniAktar);
  </script>
</body>
</html>
