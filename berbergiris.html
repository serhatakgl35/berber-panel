<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Giriş</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f7;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
width:100%;
max-width:400px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
background:#111;
color:white;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.msg{
margin-top:10px;
padding:10px;
border-radius:10px;
display:none;
font-size:14px;
}

.error{
background:#ffe5e5;
color:#b00020;
}

.success{
background:#e5ffe9;
color:#137333;
}
</style>
</head>

<body>

<div class="card">
<h1>Berber Giriş</h1>

<input id="telefon" placeholder="0546 906 65 65">
<input id="sifre" type="password" placeholder="Şifre">

<button onclick="giris()">Giriş Yap</button>

<div id="msg" class="msg"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔴 Firebase bilgilerini doldur */
const firebaseConfig = {
apiKey: "BURAYA",
authDomain: "BURAYA",
projectId: "BURAYA",
storageBucket: "BURAYA",
messagingSenderId: "BURAYA",
appId: "BURAYA"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const telInput = document.getElementById("telefon");
const msg = document.getElementById("msg");

/* 🔥 FORMAT FONKSİYONU */
function formatTelefon(value){

let t = value.replace(/\D/g,'');

// 90 ile başlıyorsa sil
if(t.startsWith("90")) t = t.substring(2);

// başı 5 ise 0 ekle
if(t.length === 10 && t.startsWith("5")) t = "0" + t;

// max 11 karakter
t = t.substring(0,11);

// formatla: 0546 906 65 65
let sonuc = "";

if(t.length > 0) sonuc += t.substring(0,4);
if(t.length >= 5) sonuc += " " + t.substring(4,7);
if(t.length >= 8) sonuc += " " + t.substring(7,9);
if(t.length >= 10) sonuc += " " + t.substring(9,11);

return sonuc;
}

/* 🔥 INPUT YAZARKEN FORMAT */
telInput.addEventListener("input", (e)=>{
const cursor = telInput.selectionStart;
telInput.value = formatTelefon(telInput.value);
telInput.setSelectionRange(cursor, cursor);
});

/* 🔥 FIRESTORE İÇİN TEMİZ HAL */
function temizTel(v){
return v.replace(/\D/g,'');
}

function mesaj(tip,text){
msg.innerText=text;
msg.className="msg "+tip;
msg.style.display="block";
}

/* 🔥 GİRİŞ */
window.giris = async function(){

const telefon = temizTel(telInput.value);
const sifre = document.getElementById("sifre").value;

if(telefon.length !== 11){
mesaj("error","Telefon eksik");
return;
}

try{

const q = query(collection(db,"berberler"), where("telefon","==",telefon));
const snap = await getDocs(q);

if(snap.empty){
mesaj("error","Kayıt yok");
return;
}

const data = snap.docs[0].data();

if(data.sifre != sifre){
mesaj("error","Şifre yanlış");
return;
}

if(data.aktif !== true){
mesaj("error","Hesap pasif");
return;
}

localStorage.setItem("berberTelefon",telefon);

mesaj("success","Giriş başarılı");

setTimeout(()=>{
window.location.href="berberpanel.html";
},500);

}catch(e){
mesaj("error","Hata: "+e.message);
console.error(e);
}

}

</script>

</body>
</html>
