<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çay Ocağı Ödemeleri</title>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f5f7;
  --text:#111;
  --muted:#666;
  --shadow:0 18px 55px rgba(0,0,0,.10);
  --soft:0 8px 25px rgba(0,0,0,.08);
  --r:26px;
}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
}
.topbar{
  position:sticky;top:0;z-index:20;
  background:rgba(17,17,17,.94);
  color:white;
  padding:14px 18px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.topbar a,.topbar button{
  background:white;color:#111;text-decoration:none;border:0;
  border-radius:999px;padding:9px 15px;font-weight:900;cursor:pointer;
}
.wrap{width:min(1180px,100%);margin:28px auto;padding:0 16px}
.card{
  background:rgba(255,255,255,.9);
  border-radius:var(--r);
  padding:24px;
  box-shadow:var(--shadow);
  margin-bottom:18px;
}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}

.iban{
  background:#f5f5f7;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  font-weight:950;
  word-break:break-word;
}

.ibanBox{
  display:flex;
  align-items:center;
  gap:10px;
}

.copyBtn{
  width:48px;
  height:48px;
  border:0;
  border-radius:16px;
  background:#111;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.status{padding:8px 13px;border-radius:999px;font-weight:900;font-size:13px}
.odendi{background:#dcfce7;color:#166534}
.bekliyor{background:#fef3c7;color:#92400e}
.reddedildi{background:#fee2e2;color:#991b1b}

.muted{color:#666;font-size:14px}
</style>
</head>

<body>

<div class="topbar">
  <a href="panel.html">Panel</a>
  <a href="randevu.html">Berber</a>
  <button onclick="logout()">Çıkış</button>
</div>

<div class="wrap">

<div class="card">
  <h1>Çay Ocağı Ödemeleri</h1>
  <p id="personelInfo"></p>
</div>

<div class="grid">

<div class="card">
  <h3>Bu Ayki Aidat</h3>
  <h1 id="aidatTutar">300 TL</h1>
  <p>Durum: <span id="personelDurum" class="status bekliyor">Ödeme Bekliyor</span></p>
</div>

<div class="card">
  <h3>IBAN</h3>

  <div class="ibanBox">
    <div id="ibanText" class="iban"></div>
    <button class="copyBtn" onclick="ibanKopyala()">📋</button>
  </div>

  <p id="copyMsg" class="muted"></p>
</div>

</div>

<div class="card">
  <h3>Geçmiş Ödemeler</h3>
  <div id="personelGecmis"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const IBAN = "TR00 0000 0000 0000 0000 0000 00";
const AYLIK_AIDAT = 300;

const tel = localStorage.getItem("musteriTelefon");
const ad = localStorage.getItem("musteriAd");

if(!tel) location.href="index.html";

document.getElementById("ibanText").textContent = IBAN;
document.getElementById("personelInfo").textContent = ad + " olarak giriş yapıldı.";

/* IBAN KOPYALA */
window.ibanKopyala = async function(){
  try{
    await navigator.clipboard.writeText(IBAN);
  }catch{
    const temp=document.createElement("input");
    temp.value=IBAN;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }
  document.getElementById("copyMsg").textContent="IBAN kopyalandı ✅";
  setTimeout(()=>document.getElementById("copyMsg").textContent="",2000);
};

/* ÖDEME VERİSİ */
async function yukle(){
  const snap = await getDocs(query(collection(db,"cay_odemeler"), where("telefon","==",tel)));

  let html="";
  snap.forEach(d=>{
    const o=d.data();
    html+=`
      <div class="card">
        ${o.ay} - ${o.tutar} TL
        <br>
        <span class="status ${o.durum==="odendi"?"odendi":o.durum==="reddedildi"?"reddedildi":"bekliyor"}">
        ${o.durum}
        </span>
      </div>
    `;
  });

  document.getElementById("personelGecmis").innerHTML = html || "Kayıt yok";
}

yukle();

function logout(){
  localStorage.clear();
  location.href="index.html";
}
window.logout=logout;
</script>

</body>
</html>
