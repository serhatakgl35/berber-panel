<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çay Ocağı Ödemeleri</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f5f7;
  --text:#111;
  --muted:#666;
  --card:#fff;
  --dark:#111;
  --shadow:0 18px 55px rgba(0,0,0,.10);
  --soft:0 8px 25px rgba(0,0,0,.08);
  --r:26px;
}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(225,229,238,.9), transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;
}
.topbar{
  position:sticky;top:0;z-index:20;
  background:rgba(17,17,17,.94);
  color:white;
  padding:14px 18px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  box-shadow:0 4px 18px rgba(0,0,0,.18);
  backdrop-filter:blur(16px);
}
.topbar a,.topbar button{
  background:white;color:#111;text-decoration:none;border:0;
  border-radius:999px;padding:9px 15px;font-weight:900;cursor:pointer;
}
.wrap{width:min(1180px,100%);margin:28px auto;padding:0 16px}
.centerWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{
  background:rgba(255,255,255,.88);
  border-radius:var(--r);
  padding:24px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
  margin-bottom:18px;
}
.loginCard{width:100%;max-width:430px}
.logo{
  width:62px;height:62px;border-radius:20px;background:#111;color:white;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  margin:0 auto 16px;
}
h1{font-size:30px;margin:0 0 10px;font-weight:950;letter-spacing:-.5px}
h2,h3{margin-top:0}
p{color:var(--muted);line-height:1.45}
label{font-weight:800;font-size:14px;display:block;margin:0 0 6px}
input,select{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid rgba(0,0,0,.10);
  margin-bottom:14px;
  font-size:16px;
  background:#f0f2f6;
  outline:none;
}
input:focus,select:focus{border-color:#111;background:white}
button.main,.btnMain{
  width:100%;
  display:block;
  text-align:center;
  background:#111;
  color:white;
  border:0;
  border-radius:17px;
  padding:15px 16px;
  font-weight:950;
  font-size:16px;
  cursor:pointer;
  text-decoration:none;
}
button.main:disabled{opacity:.55;cursor:not-allowed}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.menuGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.menuCard{
  background:white;border-radius:28px;padding:26px;text-decoration:none;color:#111;
  box-shadow:var(--shadow);transition:.18s transform,.18s box-shadow;
}
.menuCard:hover{transform:translateY(-3px);box-shadow:0 22px 65px rgba(0,0,0,.13)}
.menuIcon{
  width:58px;height:58px;border-radius:20px;background:#111;color:white;
  display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;
}
.muted{color:var(--muted);font-size:14px}
.msg{margin-top:12px;color:#c62828;font-weight:800;text-align:center;min-height:20px}
.iban{
  background:#f5f5f7;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  font-weight:950;
  word-break:break-word;
}
.status{display:inline-block;padding:8px 13px;border-radius:999px;font-weight:950;font-size:13px;white-space:nowrap}
.odendi{background:#dcfce7;color:#166534}
.bekliyor{background:#fef3c7;color:#92400e}
.reddedildi{background:#fee2e2;color:#991b1b}
.tableWrap{overflow:auto;border-radius:18px}
table{width:100%;border-collapse:collapse;background:white}
th,td{padding:13px 14px;border-bottom:1px solid #eee;text-align:left;font-size:14px;vertical-align:middle}
th{background:#f8f8f8;font-weight:950}
.small{
  background:#111;color:white;border:0;border-radius:12px;
  padding:9px 11px;font-weight:900;cursor:pointer;margin:2px;
}
.green{background:#15803d}.red{background:#b91c1c}.gray{background:#4b5563}
.tutarInput{width:95px!important;padding:8px!important;border-radius:10px!important;margin:0!important}
.hide{display:none!important}
@media(max-width:720px){
  h1{font-size:25px}
  .wrap{padding:0 10px}
  .card{padding:18px;border-radius:22px}
  th,td{font-size:13px;padding:10px}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="panel.html">Panel</a>
  <a href="randevu.html">Berber Randevusu</a>
  <button onclick="logout()">Çıkış</button>
</div>

<div class="wrap">
  <div class="card">
    <h1>Çay Ocağı Ödemeleri</h1>
    <p id="personelInfo">Yükleniyor...</p>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Bu Ayki Aidat</h3>
      <h1 id="aidatTutar">300 TL</h1>
      <p>Durum: <span id="personelDurum" class="status bekliyor">Ödeme Bekliyor</span></p>
    </div>

    <div class="card">
      <h3>Ödeme IBAN</h3>
      <div id="ibanText" class="iban">TR00 0000 0000 0000 0000 0000 00</div>
      <p class="muted">Açıklama kısmına ad soyad yazılması önerilir.</p>
    </div>
  </div>

  <div class="card">
    <h3>Geçmiş Ödeme Durumlarım</h3>
    <div id="personelGecmis">Yükleniyor...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey:"AIzaSyBUzlpulUCX3OAg2vBjGvHKZQbkswWPxE4",
  authDomain:"berber-randevu-14f7f.firebaseapp.com",
  projectId:"berber-randevu-14f7f"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ODEME_COLLECTION = "cay_odemeler";
const AYLIK_AIDAT = 300;
const IBAN = "TR00 0000 0000 0000 0000 0000 00";

const tel = localStorage.getItem("musteriTelefon");
const adLocal = localStorage.getItem("musteriAd") || "";

if(!tel){
  location.href="index.html";
}

function mevcutAy(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function durumText(durum){
  if(durum === "odendi") return "Ödendi";
  if(durum === "reddedildi") return "Reddedildi";
  return "Ödeme Bekliyor";
}

function durumClass(durum){
  if(durum === "odendi") return "odendi";
  if(durum === "reddedildi") return "reddedildi";
  return "bekliyor";
}

function logout(){
  localStorage.removeItem("musteriGiris");
  localStorage.removeItem("musteriTelefon");
  localStorage.removeItem("musteriAd");
  localStorage.removeItem("personelDocId");
  location.href="index.html";
}
window.logout = logout;

async function yukle(){
  document.getElementById("ibanText").textContent = IBAN;

  let ad = adLocal;
  try{
    const ps = await getDoc(doc(db,"personeller",tel));
    if(ps.exists()){
      const p = ps.data();
      ad = p.isim || p.adSoyad || p.ad || p.name || adLocal || "Personel";
    }
  }catch(e){ console.warn(e); }

  document.getElementById("personelInfo").textContent = ad + " olarak giriş yapıldı.";

  const ay = mevcutAy();

  const q1 = query(collection(db, ODEME_COLLECTION), where("personelId", "==", tel));
  const q2 = query(collection(db, ODEME_COLLECTION), where("telefon", "==", tel));

  const snap1 = await getDocs(q1);
  const snap2 = await getDocs(q2);

  const map = new Map();
  snap1.forEach(d=>map.set(d.id, {id:d.id, ...d.data()}));
  snap2.forEach(d=>map.set(d.id, {id:d.id, ...d.data()}));

  const list = Array.from(map.values()).sort((a,b)=>String(b.ay||"").localeCompare(String(a.ay||"")));

  let buAyDurum = "odeme_bekliyor";
  let buAyTutar = AYLIK_AIDAT;
  let html = "";

  list.forEach(o=>{
    if(o.ay === ay){
      buAyDurum = o.durum || "odeme_bekliyor";
      buAyTutar = o.tutar || AYLIK_AIDAT;
    }

    html += `
      <div class="card" style="box-shadow:var(--soft)">
        <b>${o.ay || "-"}</b><br>
        Tutar: ${o.tutar || AYLIK_AIDAT} TL<br>
        Durum: <span class="status ${durumClass(o.durum)}">${durumText(o.durum)}</span>
        ${o.adminNot ? `<p class="muted">Admin Notu: ${o.adminNot}</p>` : ""}
      </div>
    `;
  });

  document.getElementById("aidatTutar").textContent = buAyTutar + " TL";
  const durumEl = document.getElementById("personelDurum");
  durumEl.textContent = durumText(buAyDurum);
  durumEl.className = "status " + durumClass(buAyDurum);

  document.getElementById("personelGecmis").innerHTML =
    html || "<p class='muted'>Henüz ödeme kaydı yok. Bu ayki durumun: Ödeme Bekliyor.</p>";
}

yukle().catch(e=>{
  console.error(e);
  document.getElementById("personelGecmis").innerHTML = "<p class='msg'>Ödeme bilgileri yüklenemedi.</p>";
});
</script>
</body>
</html>
